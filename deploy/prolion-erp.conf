[options]
; ============================================
; 普洛狮ERP (ProLion ERP) 配置文件
; 基于 Odoo 19.0 Community Edition
; ============================================

; === 系统管理密码 ===
; 用于通过 /web/database/manager 创建/管理数据库
; 请务必修改为强密码！
admin_passwd = ProLion@ERP2026!SecureKey

; === 数据库配置 ===
db_host = 58.250.155.28
db_port = 31002
db_user = prolion
db_password = CHANGE_ME_TO_YOUR_DB_PASSWORD
db_name = prolion_erp
db_maxconn = 64
db_template = template0

; === 网络配置 ===
http_port = 31011
longpolling_port = 31012
http_interface = 0.0.0.0
proxy_mode = True

; === 模块路径 ===
addons_path = /opt/prolion-erp/server/addons,/opt/prolion-erp/server/odoo/addons,/opt/prolion-erp/custom-addons

; === 数据目录 ===
data_dir = /opt/prolion-erp/data

; === 日志配置 ===
logfile = /opt/prolion-erp/logs/prolion-erp.log
log_level = info
log_handler = :INFO
logrotate = True

; === 性能配置 ===
; workers = 0 单进程模式（适合开发调试）
; workers > 0 多进程模式（生产推荐）
; 推荐公式: workers = CPU核心数 * 2 + 1
workers = 4
max_cron_threads = 2
limit_memory_hard = 2684354560
limit_memory_soft = 2147483648
limit_time_cpu = 600
limit_time_real = 1200
limit_time_real_cron = -1
limit_request = 8192

; === 安全配置 ===
list_db = False
dbfilter = ^prolion_erp$
server_wide_modules = base,web

; === 国际化 ===
load_language = zh_CN

# ============================================
# docker-compose.yml - 普洛狮ERP
# 开发/测试环境
# ============================================
version: '3.8'

services:
  prolion-erp:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: prolion-erp
    restart: unless-stopped
    ports:
      - "31011:31011"
      - "31012:31012"
    volumes:
      - prolion-data:/opt/prolion-erp/data
      - prolion-logs:/opt/prolion-erp/logs
      - ../custom-addons:/opt/prolion-erp/custom-addons
      - ./prolion-erp.conf:/opt/prolion-erp/prolion-erp.conf:ro
    environment:
      - LANG=C.UTF-8
    networks:
      - prolion-net

  nginx:
    image: nginx:1.27-alpine
    container_name: prolion-nginx
    restart: unless-stopped
    ports:
      - "31013:80"
      - "31014:443"
    volumes:
      - ./nginx/prolion-erp.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - prolion-erp
    networks:
      - prolion-net

volumes:
  prolion-data:
  prolion-logs:

networks:
  prolion-net:
    driver: bridge

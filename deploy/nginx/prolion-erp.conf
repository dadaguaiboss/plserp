# ============================================
# 普洛狮ERP Nginx 反向代理配置
# ============================================

upstream prolion_odoo {
    server prolion-erp:31011 weight=1 fail_timeout=0;
}

upstream prolion_odoo_longpoll {
    server prolion-erp:31012 weight=1 fail_timeout=0;
}

# 如果不在 Docker 中，改为:
# upstream prolion_odoo {
#     server 127.0.0.1:31011 weight=1 fail_timeout=0;
# }
# upstream prolion_odoo_longpoll {
#     server 127.0.0.1:31012 weight=1 fail_timeout=0;
# }

server {
    listen 80;
    server_name _;

    # 访问日志
    access_log /var/log/nginx/prolion-access.log;
    error_log /var/log/nginx/prolion-error.log;

    # 请求大小限制（支持大文件上传）
    client_max_body_size 200m;

    # Gzip 压缩
    gzip on;
    gzip_types text/css text/plain text/xml application/xml application/javascript application/json image/svg+xml;
    gzip_min_length 1000;
    gzip_vary on;
    gzip_proxied any;

    # 代理通用头部
    proxy_read_timeout 720s;
    proxy_connect_timeout 720s;
    proxy_send_timeout 720s;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header Host $http_host;
    proxy_buffers 16 64k;
    proxy_buffer_size 128k;

    # WebSocket 支持（Odoo 19 实时消息推送）
    location /websocket {
        proxy_pass http://prolion_odoo_longpoll;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
    }

    # 长轮询兼容（旧版客户端）
    location /longpolling {
        proxy_pass http://prolion_odoo_longpoll;
    }

    # 静态文件缓存
    location ~* /web/static/ {
        proxy_cache_valid 200 90m;
        proxy_buffering on;
        expires 864000;
        proxy_pass http://prolion_odoo;
    }

    # Web 图标
    location = /web/image {
        proxy_cache_valid 200 60m;
        proxy_buffering on;
        proxy_pass http://prolion_odoo;
    }

    # 所有其他请求
    location / {
        proxy_pass http://prolion_odoo;
        proxy_redirect off;
    }
}

